<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores</title>
    <style>
        *{
            height: 100%;
        }
        body{  
                /* No background-image: linear-gradient aonde está o "to top", da para mudar tambem a diagonal(numQescolherdeg), to bottom(pega de cima para baixo), to right e to left */
                background-image: linear-gradient(to top, #6A00D6,white);

                /* Esse background-attachment: fixed; serve pra deixar um limite na pagina, ai n fica um espacinho branco embaixo*/
                background-attachment: fixed;
        }
        h1{
            height: 6%;
            background-color: #6A00D6;
            color : #8F78AD
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Testando as Cores</h1>
</body>
</html>
