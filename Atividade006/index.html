    <h1>Links Externos e Internos</h1>
    <hr>
    <h2>Usando Links Externos :</h2>
    <p>Olha uma um link do<a href="https://www.youtube.com/@cursoemvideo" target="_blank" rel="external"> cursoemvideo</a>.</p>

    <!-- o target = "_blank" é importante no uso de links externos -->
    
    <h2>Links Internos :</h2>
    <p>Olhe meu <a href="pag2.html" target="_self" rel="next">segundo site</a>.</p>

    <!-- O target = "_self" não é necessaria, porque ja e o default -->

    <h2>Links de Download :</h2>
    <p>Baixar<a href="Atividades - Fundamentos do BI.docx"> Fundamentos do BI.docx </a>do curso de Power Bi.</p>
