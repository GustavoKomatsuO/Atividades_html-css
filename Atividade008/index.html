<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
</head>
<body>
    <h1>Hospedando Vídeos Localmente :</h1>
    <hr>
    <p>Olha o videozinho ai &downarrow;</p>
    
    <video width="300px" poster="tubmGato.jpg" controls loop>
    <source src="gatito.mp4" type="video/mp4">
    <p>Video não roda no seu PC</p>
    </video>
     <!-- O poster é bom para colocar uma tumb no video, e o controls é a msm coisa do de audio -->

     <h1>Inserindo Videos do YouTube :</h1>
     <p>Aqui hosteia direto do YouTube &downarrow;</p>
     <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=V-5Dnhd2aMBlcA7s" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

     <!--Pegar do youtube so funciona com a extensão Live Server ativada-->
     
</body>
</html>
